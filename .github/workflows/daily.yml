name: Daily Digest

on:
  schedule:
    # UTC 0:55 → 北京时间 8:55 开始跑, ~4分钟处理完, 刚好9:00收到推送
    - cron: '55 0 * * *'
  workflow_dispatch: {}   # 支持手动触发测试

permissions:
  contents: write         # 提交 seen_ids.db 到仓库
  pages: write            # 部署 GitHub Pages
  id-token: write         # Pages 部署认证
  issues: write           # 可选：创建 Issue 推送

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Fetch Papers
        run: python src/fetch_arxiv.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Generate Summaries
        run: python src/summarize.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Push to Feishu
        if: success()
        run: python src/push_feishu.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

      - name: Push Email
        if: success()
        run: python src/push_email.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      - name: Generate Pages
        if: success()
        run: python src/push_pages.py

      - name: Push Issues (optional)
        if: success()
        run: python src/push_issues.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit seen_ids.db
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.db pages_output/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📝 update seen ids & pages [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages_output
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "📝 deploy pages [skip ci]"
