name: Daily Digest

on:
  schedule:
    # UTC 0:50 = 北京时间 8:50 启动（兜底）。主触发由外部 cron 在 8:55 通过
    # workflow_dispatch API 即时触发，绕过 GitHub Actions 调度延迟。
    # 幂等性检查确保同一天不会重复推送。
    - cron: '50 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 幂等性检查：如果今天已经成功推送过，跳过 ──
      - name: Check if already run today
        id: check_today
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          FLAG_FILE="data/last_push_date.txt"
          if [ -f "$FLAG_FILE" ]; then
            LAST=$(cat "$FLAG_FILE" | tr -d '[:space:]')
            if [ "$LAST" = "$TODAY" ]; then
              echo "✅ 今天 ($TODAY) 已经推送过了，跳过"
              echo "already_done=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "already_done=false" >> $GITHUB_OUTPUT
          echo "📋 今天 ($TODAY) 尚未推送，开始执行"

      - name: Setup Python
        if: steps.check_today.outputs.already_done != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        if: steps.check_today.outputs.already_done != 'true'
        run: pip install -r requirements.txt

      - name: Fetch Papers (arXiv)
        if: steps.check_today.outputs.already_done != 'true'
        run: python src/fetch_arxiv.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      # ── arXiv 0 篇时自动 fallback 到 Semantic Scholar ──
      - name: Fetch Papers (Semantic Scholar fallback)
        if: steps.check_today.outputs.already_done != 'true'
        run: |
          COUNT=$(python -c "import json; d=json.load(open('data/today_papers.json')); print(d.get('count', 0))")
          echo "arXiv 抓取结果: $COUNT 篇"
          if [ "$COUNT" -eq 0 ]; then
            echo "⚠️  arXiv 返回 0 篇，启动 Semantic Scholar 备用源..."
            python src/fetch_semantic_scholar.py
          else
            echo "✅ arXiv 已有结果，跳过备用源"
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Generate Summaries
        if: steps.check_today.outputs.already_done != 'true'
        run: python src/summarize.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      # ── 等待北京时间 9:00 整再发送 ──
      - name: Wait until 9:00 Beijing time
        if: steps.check_today.outputs.already_done != 'true'
        run: |
          TARGET_UTC=1   # 1:00 UTC = 9:00 Beijing
          NOW_SEC=$(date +%s)
          TARGET_SEC=$(date -d "today 0${TARGET_UTC}:00:00 UTC" +%s 2>/dev/null || date -d "today 01:00:00 UTC" +%s)
          if [ "$NOW_SEC" -lt "$TARGET_SEC" ]; then
            WAIT=$((TARGET_SEC - NOW_SEC))
            echo "⏳ 所有内容已处理完毕，等待 ${WAIT} 秒后于北京时间 9:00 准时推送..."
            sleep $WAIT
          fi
          echo "✅ 北京时间 $(TZ='Asia/Shanghai' date +%H:%M:%S)，开始推送"

      - name: Push to Feishu
        if: steps.check_today.outputs.already_done != 'true'
        run: python src/push_feishu.py
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

      - name: Push Email
        if: steps.check_today.outputs.already_done != 'true'
        run: python src/push_email.py
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

      - name: Generate Pages
        if: steps.check_today.outputs.already_done != 'true'
        run: python src/push_pages.py

      - name: Push Issues (optional)
        if: steps.check_today.outputs.already_done != 'true'
        run: python src/push_issues.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit seen_ids.db
        if: steps.check_today.outputs.already_done != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.db pages_output/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📝 update seen ids & pages [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        if: steps.check_today.outputs.already_done != 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages_output
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "📝 deploy pages [skip ci]"

      # ── 推送成功后标记今天已完成 ──
      - name: Mark today as pushed
        if: steps.check_today.outputs.already_done != 'true'
        run: |
          TODAY=$(TZ='Asia/Shanghai' date +%Y-%m-%d)
          echo "$TODAY" > data/last_push_date.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_push_date.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📌 mark push done for $TODAY [skip ci]"
          git push || echo "⚠️ push last_push_date failed (will retry next run)"
